<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tandy Bridge Installer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; color: #333; }
        .container { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; }
        p { color: #666; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tandy 12 Bridge Installer</h1>
        <p>Plug your ESP32 into your computer via USB and click the button below to flash the firmware. (Requires Chrome or Edge).</p>
        
        <!-- THE CORRECTED SCRIPT TAG -->
        <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
        
        <esp-web-install-button manifest="manifest.json">
            <span slot="unsupported">Your browser does not support Web Serial! Please use Chrome or Edge.</span>
            <span slot="not-allowed">You must use HTTPS to flash the device.</span>
        </esp-web-install-button>
    </div>
</body>
</html>
